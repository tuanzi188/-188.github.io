<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>恋爱人格测试 - 30道情景题</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #ff8a6f;
            --primary-dark: #e86a4f;
            --primary-light: #ffdde1;
            --bg-body: #fef6f0;
            --bg-card: white;
            --bg-app: #fffbf5;
            --text-dark: #3b2a25;
            --text-medium: #4c3730;
            --text-muted: #8B5A4E;
            --border-light: #ffe0d4;
            --bg-option: #f9f3ef;
            --bg-option-active: #ffe4dc;
            --bg-score: #f9ede6;
            --bg-highlight: #fef4ee;
            --bg-tip: #fff5f0;
            --radius-xl: 40px;
            --radius-lg: 32px;
            --radius-md: 20px;
            --radius-sm: 12px;
            --shadow-card: 0 8px 24px rgba(0,0,0,0.06);
            --shadow-btn: 0 4px 12px rgba(255,138,111,0.3);
            --transition-fast: 0.2s ease;
            --transition-normal: 0.3s ease;
            --color-anxiety: #F7C59F;
            --color-avoidance: #B5C9E2;
            --color-secure: #98D2C0;
            --color-guide: #FFA07A;
            --color-fearful: #D9A7B0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-body);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 30px;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
            background: var(--bg-app);
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 36px 20px 28px;
            background: linear-gradient(135deg, var(--primary-light) 0%, #f9c9c2 100%);
            border-radius: 0 0 var(--radius-xl) var(--radius-xl);
            color: #5e2e2e;
            position: relative;
            overflow: hidden;
        }
        .header h1 { font-size: 28px; letter-spacing: 2px; }
        .header h2 { font-size: 22px; letter-spacing: 1px; }
        .header p { margin-top: 8px; opacity: 0.8; font-size: 14px; }

        .hearts-container {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .floating-heart {
            position: absolute;
            bottom: -30px;
            animation: floatUp linear infinite;
            opacity: 0;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.7; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-220px) rotate(30deg) scale(0.4); opacity: 0; }
        }

        .card {
            background: var(--bg-card);
            margin: 20px 16px;
            border-radius: var(--radius-lg);
            padding: 24px 20px;
            box-shadow: var(--shadow-card);
            animation: cardIn 0.4s ease both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-text {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 24px;
            color: var(--text-dark);
        }

        .progress-wrapper { margin: 16px 20px; }
        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .progress {
            background: #f0e2da;
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar {
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            height: 100%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px;
        }

        .option-item {
            background: var(--bg-option);
            border-radius: 48px;
            padding: 14px 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            border: 1.5px solid var(--border-light);
            user-select: none;
            -webkit-user-select: none;
        }
        .option-item:hover { background: #fdf0ea; }
        .option-item:active, .option-item.selected {
            background: var(--bg-option-active);
            transform: scale(0.97);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255,138,111,0.15);
        }
        .option-prefix {
            font-weight: bold;
            background: #fff0e6;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            color: #c26b55;
            flex-shrink: 0;
            margin-right: 14px;
            transition: all var(--transition-fast);
        }
        .option-item.selected .option-prefix {
            background: var(--primary);
            color: white;
        }
        .option-text { flex: 1; font-size: 16px; color: #4a2e26; }

        .btn-group { display: flex; margin-top: 24px; }
        .btn-group > * + * { margin-left: 12px; }
        button {
            flex: 1;
            background: var(--primary);
            border: none;
            padding: 14px;
            border-radius: 80px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-btn);
            user-select: none;
            -webkit-user-select: none;
        }
        button:active { transform: scale(0.96); }
        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            box-shadow: none;
        }
        button:disabled:active { transform: none; }
        button.secondary {
            background: #e9d9d0;
            color: #6f4e41;
            box-shadow: none;
        }
        button.ghost {
            background: transparent;
            color: var(--primary);
            box-shadow: none;
            border: 1.5px solid var(--primary);
        }

        .result-type {
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 12px;
            color: #cc6b51;
        }
        .result-emoji { font-size: 48px; text-align: center; margin-bottom: 8px; }
        .result-desc {
            background: var(--bg-highlight);
            border-radius: var(--radius-md);
            padding: 20px;
            margin: 18px 0;
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-medium);
        }

        .score-section { margin: 16px 0; }
        .score-bar-item { margin-bottom: 14px; }
        .score-bar-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dark);
        }
        .score-bar-track {
            background: #f0e2da;
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
        }
        .score-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .score-level {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 8px;
            margin-right: 4px;
        }
        .score-pct {
            font-size: 12px;
            color: #999;
            margin-left: 2px;
        }
        .dim-definition {
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
            padding-left: 2px;
        }
        .secondary-type-card {
            background: linear-gradient(135deg, #fff5f0, #f0f4ff);
            border-radius: 16px;
            padding: 16px 20px;
            margin: 16px 0;
            border: 1px solid #f0e2da;
        }
        .secondary-type-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .secondary-type-content {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .secondary-type-content > * + * {
            margin-left: 8px;
        }
        .secondary-type-icon {
            font-size: 24px;
        }
        .secondary-type-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
        }
        .secondary-type-score {
            font-size: 13px;
            color: #888;
            margin-left: auto;
        }
        .secondary-type-hint {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
        .duration-info {
            text-align: center;
            padding: 10px 0;
            font-size: 13px;
            color: #aaa;
        }
        .positive-view-card {
            background: linear-gradient(135deg, #fff8f0, #f0f8ff);
            border-radius: 16px;
            padding: 16px 20px;
            margin: 12px 0;
            border: 1px solid #f0e8da;
        }
        .positive-view-label {
            font-size: 12px;
            color: #E86A4F;
            margin-bottom: 6px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .positive-view-text {
            font-size: 14px;
            color: var(--text-medium);
            line-height: 1.7;
        }
        .scenario-advice-item {
            background: #fef8f4;
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 10px;
            border: 1px solid #f0e8da;
        }
        .scenario-advice-item:last-child { margin-bottom: 0; }
        .scenario-advice-scene {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 6px;
        }
        .scenario-advice-reaction {
            font-size: 13px;
            color: var(--text-medium);
            line-height: 1.5;
            margin-bottom: 4px;
        }
        .scenario-advice-tip {
            font-size: 13px;
            color: #E86A4F;
            line-height: 1.5;
        }

        .detail-section { margin: 16px 0; }
        .detail-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: var(--bg-highlight);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            color: var(--text-dark);
            transition: all var(--transition-fast);
            border: none;
            width: 100%;
            text-align: left;
            font-size: 15px;
        }
        .detail-toggle:active { background: #fde8dc; }
        .detail-toggle .arrow {
            transition: transform var(--transition-normal);
            font-size: 12px;
            color: var(--text-muted);
        }
        .detail-toggle .arrow.open { transform: rotate(180deg); }
        .detail-content {
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
        }
        .detail-card {
            margin-top: 12px;
            padding: 16px;
            background: #fdf8f5;
            border-radius: var(--radius-md);
            border: 1px solid #f0e2da;
        }
        .detail-card h4 {
            font-size: 14px;
            color: var(--text-dark);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .detail-card h4 > * + * { margin-left: 6px; }
        .detail-card ul { list-style: none; padding: 0; }
        .detail-card li {
            padding: 4px 0;
            font-size: 14px;
            color: var(--text-medium);
            line-height: 1.5;
        }
        .detail-card li::before {
            content: "•";
            margin-right: 8px;
            color: var(--primary);
        }
        .detail-card p {
            font-size: 14px;
            color: var(--text-medium);
            line-height: 1.6;
        }

        .detail-tabs {
            display: flex;
            background: #f9ede6;
            border-radius: 14px;
            padding: 4px;
            margin-top: 12px;
        }
        .detail-tabs > * + * { margin-left: 4px; }
        .detail-tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 8px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition-fast);
            box-shadow: none;
            text-align: center;
        }
        .detail-tab-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .detail-tab-btn:active { transform: scale(0.96); }
        .detail-tab-content {
            margin-top: 12px;
        }

        .share-buttons { display: flex; margin: 20px 0; }
        .share-buttons > * + * { margin-left: 12px; }
        .share-buttons button i { margin-right: 6px; }

        .radar-container { margin: 20px 0; height: 280px; width: 100%; max-width: 100%; overflow: hidden; }

        .disclaimer {
            text-align: center;
            font-size: 11px;
            color: #c4a89e;
            padding: 12px 16px 0;
            line-height: 1.5;
        }

        .history-item {
            background: #fdf8f5;
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #f0e2da;
            transition: all var(--transition-fast);
        }
        .history-item:active { background: #fde8dc; }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .history-type { font-weight: 700; font-size: 16px; color: var(--text-dark); }
        .history-date { font-size: 12px; color: var(--text-muted); }
        .history-scores { display: flex; flex-wrap: wrap; }
        .history-scores > * { margin-right: 8px; margin-bottom: 8px; }
        .history-score-tag {
            background: var(--bg-highlight);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-medium);
        }

        .daily-tip {
            background: linear-gradient(135deg, var(--bg-tip), #fff0e6);
            border-radius: var(--radius-md);
            padding: 16px;
            border: 1px solid var(--border-light);
        }
        .daily-tip-label {
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .daily-tip-text {
            font-size: 14px;
            color: var(--text-medium);
            line-height: 1.6;
        }

        .dimensions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 16px 0;
        }
        .dimension-chip {
            background: #fdf8f5;
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
            border: 1px solid #f0e2da;
            transition: transform var(--transition-fast);
        }
        .dimension-chip:active { transform: scale(0.96); }
        .dimension-chip .dim-icon { font-size: 24px; margin-bottom: 4px; }
        .dimension-chip .dim-name { font-size: 13px; font-weight: 600; color: var(--text-dark); }
        .dimension-chip .dim-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        .compat-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-light), #f9c9c2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #5e2e2e;
            margin-top: 8px;
        }

        .poster-hidden {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 375px;
            background: white;
            padding: 24px;
            border-radius: var(--radius-xl);
            text-align: center;
            z-index: -1;
        }

        .fade-slide-enter-active { transition: all 0.35s ease; }
        .fade-slide-leave-active { transition: all 0.2s ease; position: absolute; width: 100%; }
        .fade-slide-enter-from { opacity: 0; transform: translateX(40px); }
        .fade-slide-leave-to { opacity: 0; transform: translateX(-40px); }

        .fade-enter-active { transition: all 0.3s ease; }
        .fade-leave-active { transition: all 0.2s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(59,42,37,0.82);
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 999;
            pointer-events: none;
            animation: toastIn 0.3s ease;
            white-space: nowrap;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .clear-history-btn {
            background: transparent;
            color: #c26b55;
            border: 1px solid #f0c4b8;
            font-size: 13px;
            padding: 10px 16px;
            box-shadow: none;
        }
        .clear-history-btn:active { background: #fef0e8; }

        .gender-section-label {
            font-size: 12px;
            color: #c4a89e;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .gender-cards {
            display: flex;
            justify-content: center;
        }
        .gender-cards > * + * { margin-left: 16px; }
        .gender-card {
            flex: 1;
            max-width: 140px;
            background: #fdf8f5;
            border: 2px solid #f0e2da;
            border-radius: var(--radius-lg);
            padding: 24px 16px 20px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .gender-card:active, .gender-card.active {
            border-color: var(--primary);
            background: #fff0e8;
            box-shadow: 0 0 0 3px rgba(255,138,111,0.15);
            transform: scale(0.97);
        }
        .gender-card .gender-icon { font-size: 42px; margin-bottom: 10px; }
        .gender-card .gender-label { font-size: 16px; font-weight: 600; color: var(--text-dark); }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 32px 16px;
        }
        .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; }

        .section-divider {
            display: flex;
            align-items: center;
            margin: 24px 0 16px;
        }
        .section-divider::before,
        .section-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #f0e2da;
        }
        .section-divider span {
            padding: 0 14px;
            font-size: 12px;
            color: #c4a89e;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .stage-cards {
            display: flex;
            flex-wrap: wrap;
        }
        .stage-cards > * { flex: 1 1 calc(50% - 5px); min-width: 0; }
        .stage-cards > *:nth-child(odd) { margin-right: 5px; }
        .stage-cards > *:nth-child(even) { margin-left: 5px; }
        .stage-cards > *:nth-child(n+3) { margin-top: 10px; }
        .stage-card {
            background: #fdf8f5;
            border: 2px solid #f0e2da;
            border-radius: 16px;
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .stage-card:active, .stage-card.active {
            border-color: var(--primary);
            background: #fff0e8;
            box-shadow: 0 0 0 3px rgba(255,138,111,0.12);
            transform: scale(0.97);
        }
        .stage-card .stage-icon { font-size: 26px; margin-bottom: 4px; }
        .stage-card .stage-label { font-size: 13px; font-weight: 600; color: var(--text-dark); }
        .stage-card .stage-desc { font-size: 11px; color: #b8a8a0; margin-top: 4px; line-height: 1.4; }

        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 24px;
        }

        ::-webkit-scrollbar { width: 0; }

        i { margin-right: 6px; }
    </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.bootcdn.net/ajax/libs/vue/3.3.4/vue.global.prod.js"></script>
<script>
const questions = [
    { text: "周末下午你窝在沙发上自顾刷手机，对方一言不发凑过来挨着你坐下，直接把头靠在你肩膀上，没有任何语言交流。你最可能的反应是？", options: [
        { text: "心跳突然变快，不敢乱动，忍不住胡思乱想TA是不是心情低落、急需安慰", scores: { anxiety: 1 } },
        { text: "暗自开心，主动放下手机接住这份亲近，顺势主动闲聊，拉近两人氛围", scores: { guide: 1 } },
        { text: "心里暖暖的，顺其自然接受亲近，继续安静刷手机，不刻意主动搭话", scores: { secure: 1 } },
        { text: "有点不习惯亲密靠得太近，表面不动声色，下意识心里拉开一点距离", scores: { avoidance: 1 } }
    ]},
    { text: "你从早忙工作一整天，中途好几个小时没看手机，下班点开发现对方断断续续给你发了好几条日常琐事消息。你的第一反应是？", options: [
        { text: "没太大感觉，没必要秒回，什么时候有空什么时候再回复就行", scores: { avoidance: 1 } },
        { text: "心里反复纠结，想立刻回又怕显得太主动，害怕自己热情不被珍惜", scores: { anxiety: 1 } },
        { text: "感受到对方的惦记，会主动及时回应，顺势开启聊天，维系日常互动感", scores: { guide: 1 } },

    return dailyTips[idx];

function getPersonalityType(scores) {
    const { anxiety, avoidance, secure, guide } = scores;
    const total = anxiety + avoidance + secure + guide;
    const high = total * 0.30;
    if (anxiety >= high && avoidance >= high) return "fearful";
    if (guide >= high && guide >= anxiety && guide >= avoidance && guide >= secure) return "guide";
    if (secure >= high && secure >= anxiety && secure >= avoidance && secure >= guide) return "secure";
    if (anxiety > avoidance) return "anxious";
    if (avoidance > anxiety) return "avoidant";
    return "secure";
}

        const secondaryType = computed(() => {

            const sorted = scoreDimensions.slice().sort((a, b) => scores[b.key] - scores[a.key]);
            const primary = typeKeyMap[resultType.value] || resultType.value;
            for (var i = 0; i < sorted.length; i++) {

                var mapped = typeKeyMap[dim.key];
                if (mapped && mapped !== primary && mapped !== 'fearful') {
                    var pct = scores[dim.key] / dim.max;
                    if (pct >= 0.25) {
                        return { key: dim.key, label: dim.label, icon: dim.icon, score: scores[dim.key], max: dim.max, pct: Math.round(pct * 100) };
                    }
                }
            }
            return null;

        function formatDuration(sec) {
            if (!sec) return '';
            var min = Math.floor(sec / 60);
            var s = sec % 60;
            if (min > 0) return min + '分' + s + '秒';
            return s + '秒';
        }

            var remaining = Math.ceil(perQ * (questions.length - currentIndex.value));

                    selectedIdx.value = matchIdx >= 0 ? matchIdx : -1;

            const currentOpts = questions[currentIndex.value].options;
            const selectedScores = currentOpts[selectedIdx.value].scores;
            if (currentIndex.value < answers.value.length) {
                answers.value[currentIndex.value] = selectedScores;
            } else {
                answers.value.push(selectedScores);
            }
            if (currentIndex.value + 1 < questions.length) {
                currentIndex.value++;
                if (currentIndex.value < answers.value.length) {
                    const prev = answers.value[currentIndex.value];
                    const matchIdx = questions[currentIndex.value].options.findIndex(function(o) {

                    selectedIdx.value = matchIdx >= 0 ? matchIdx : -1;
                } else {
                    selectedIdx.value = -1;
                }
            } else {

            }

            return val % 1 === 0 ? val.toString() : val.toFixed(1);

        function computeResult() {
            const totals = { anxiety: 0, avoidance: 0, secure: 0, guide: 0 };
            for (let i = 0; i < answers.value.length; i++) {
                const ans = answers.value[i];
                const w = questions[i].weight || 1;
                if (ans.anxiety) totals.anxiety += ans.anxiety * w;
                if (ans.avoidance) totals.avoidance += ans.avoidance * w;
                if (ans.secure) totals.secure += ans.secure * w;
                if (ans.guide) totals.guide += ans.guide * w;
            }
            totals.anxiety = Math.round(totals.anxiety * 10) / 10;
            totals.avoidance = Math.round(totals.avoidance * 10) / 10;
            totals.secure = Math.round(totals.secure * 10) / 10;
            totals.guide = Math.round(totals.guide * 10) / 10;
            testDuration.value = Math.round((Date.now() - startTestTime.value) / 1000);
            finalScores.value = totals;

                    var observer = new IntersectionObserver(function(entries) {
                        if (entries[0].isIntersecting) {

                    observer.observe(chartDom);

                        <div class="secondary-type-label">次倾向</div>
                        <div class="secondary-type-content">
                            <span class="secondary-type-icon">{{ secondaryType.icon }}</span>
                            <span class="secondary-type-name">{{ secondaryType.label }}</span>
                            <span class="secondary-type-score">{{ secondaryType.score }} / {{ secondaryType.max }}（{{ secondaryType.pct }}%）</span>
                        </div>
                        <div class="secondary-type-hint">你的{{ secondaryType.label }}占比也较高，说明你在关系中同时具备{{ secondaryType.label.replace('倾向','').replace('型','') }}的特质</div>
                    </div>

                    <div v-if="testDuration" class="duration-info">
                        <span>⏱️ 测试用时：{{ formatDuration(testDuration) }}</span>
                    </div>

                    <div id="radarChart" class="radar-container"></div>

                    <div class="detail-section">
                        <button class="detail-toggle" @click="showDetail = !showDetail">
                            <span>📖 查看详细解读</span>
                            <span class="arrow" :class="{open: showDetail}">▼</span>
                        </button>
                        <div class="detail-content" :style="{maxHeight: showDetail ? '1600px' : '0', opacity: showDetail ? 1 : 0}">
                            <div class="detail-tabs">
                                <button class="detail-tab-btn" :class="{active: detailTab === 'traits'}" @click="detailTab = 'traits'">🌟 核心特质</button>
                                <button class="detail-tab-btn" :class="{active: detailTab === 'advice'}" @click="detailTab = 'advice'">💡 相处建议</button>
                                <button class="detail-tab-btn" :class="{active: detailTab === 'match'}" @click="detailTab = 'match'">💕 适配人格</button>
                            </div>
                            <div class="detail-tab-content">
                                <div v-if="detailTab === 'traits'">
                                    <div class="detail-card">
                                        <h4>🌟 核心特质</h4>
                                        <ul><li v-for="t in (typeDetails[resultType] ? typeDetails[resultType].traits : [])" :key="t">{{ t }}</li></ul>
                                    </div>
                                    <div class="detail-card">
                                        <h4>💪 你的优势</h4>
                                        <ul><li v-for="s in (typeDetails[resultType] ? typeDetails[resultType].strengths : [])" :key="s">{{ s }}</li></ul>
                                    </div>
                                </div>
                                <div v-if="detailTab === 'advice'">
                                    <div class="detail-card">
                                        <h4>🌱 成长空间</h4>
                                        <ul><li v-for="g in (typeDetails[resultType] ? typeDetails[resultType].growth : [])" :key="g">{{ g }}</li></ul>
                                    </div>
                                    <div v-if="genderAdviceText" class="detail-card">
                                        <h4>{{ gender === 'male' ? '👦 给男生的专属建议' : '👧 给女生的专属建议' }}</h4>
                                        <p>{{ genderAdviceText }}</p>
                                    </div>
                                    <div v-if="typeDetails[resultType] && typeDetails[resultType].scenarioAdvice" class="detail-card">
                                        <h4>🎭 场景化建议</h4>
                                        <div v-for="(sa, saIdx) in typeDetails[resultType].scenarioAdvice" :key="saIdx" class="scenario-advice-item">
                                            <div class="scenario-advice-scene">{{ sa.scene }}</div>
                                            <div class="scenario-advice-reaction"><strong>你的反应：</strong>{{ sa.reaction }}</div>
                                            <div class="scenario-advice-tip"><strong>优化做法：</strong>{{ sa.tip }}</div>
                                        </div>
                                    </div>
                                </div>
                                <div v-if="detailTab === 'match'">
                                    <div class="detail-card">
                                        <h4>💕 恋爱搭配建议</h4>
                                        <p>{{ typeDetails[resultType] ? typeDetails[resultType].compatibility : '' }}</p>
                                        <div class="compat-badge">最佳搭档：{{ typeDetails[resultType] ? typeDetails[resultType].idealPartner : '' }}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="share-buttons">
                        <button @click="shareResult"><i class="fas fa-share-alt"></i> 分享</button>
                        <button @click="generatePoster"><i class="fas fa-image"></i> 海报</button>
                        <button class="secondary" @click="retest"><i class="fas fa-redo"></i> 重测</button>
                    </div>
                </div>
            </template>

            <template v-if="currentView === 'history'">
                <div class="header">
                    <h2>📜 测试历史</h2>
                    <p>回顾你的恋爱人格变化</p>
                </div>
                <div class="card">
                    <div v-if="!history.length" class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>暂无历史记录</p>
                    </div>
                    <div v-for="(item, idx) in history" :key="idx" class="history-item">
                        <div class="history-header">
                            <span class="history-type">{{ typeDetails[item.type] ? typeDetails[item.type].emoji : '' }} {{ typeDetails[item.type] ? typeDetails[item.type].name : '' }}{{ item.gender ? (item.gender === 'male' ? ' 👦' : ' 👧') : '' }}</span>
                            <span class="history-date">{{ formatDate(item.timestamp) }}</span>
                        </div>
                        <div class="history-scores">
                            <span class="history-score-tag">😰 {{ item.scores.anxiety }}</span>
                            <span class="history-score-tag">🏃 {{ item.scores.avoidance }}</span>
                            <span class="history-score-tag">🌿 {{ item.scores.secure }}</span>
                            <span class="history-score-tag">✨ {{ item.scores.guide }}</span>
                        </div>
                    </div>
                    <div style="display:flex; margin-top:16px;">
                        <button @click="currentView='home'" class="secondary" style="flex:1; margin-right:12px;"><i class="fas fa-arrow-left"></i> 返回</button>
                        <button v-if="history.length" @click="clearHistory" class="clear-history-btn" style="flex:1"><i class="fas fa-trash"></i> 清空记录</button>
                    </div>
                </div>
            </template>

            <div id="posterContainer" class="poster-hidden" style="width:340px; background:#fffaf5; padding:24px; border-radius:40px;">
                <div style="text-align:center; font-size:12px; color:#ff8a6f; letter-spacing:2px; margin-bottom:4px;">LOVE PERSONALITY</div>
                <div style="text-align:center; font-size:24px; font-weight:bold; margin:8px 0;">恋爱人格报告</div>
                <div id="posterEmoji" style="font-size:40px; text-align:center;"></div>
                <div id="posterTypeName" style="font-size:28px; font-weight:800; color:#D2694E; margin:8px 0; text-align:center;"></div>
                <div id="posterScores" style="background:#FEF0E8; padding:14px; border-radius:20px; margin:12px 0; font-size:14px; line-height:1.8;"></div>
                <div id="posterRadar" style="width:280px; height:220px; margin:8px auto;"></div>
                <div id="posterDesc" style="background:#FEF0E8; padding:14px; border-radius:20px; margin:12px 0; font-size:13px; line-height:1.6;"></div>
                <div id="posterQR" style="display:flex; justify-content:center; margin:12px 0;"></div>
                <div style="text-align:center; font-size:12px; color:#aaa;">扫码测测你的恋爱人格</div>
            </div>

            <transition name="fade">
                <div v-if="toastMsg" class="toast">{{ toastMsg }}</div>
            </transition>
        </div>
    `
}).mount('#app');
</script>
</body>
</html>
